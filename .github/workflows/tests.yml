name: CI

on:
  push:
    paths:
      - "askee_ds/**"
      - "components/**"
      - "tokens/**"
      - "examples/**"
      - "tools/**"
      - "design/**"
      - "tests/**"
      - ".github/workflows/tests.yml"
  pull_request:
    paths:
      - "askee_ds/**"
      - "components/**"
      - "tokens/**"
      - "examples/**"
      - "tools/**"
      - "design/**"
      - "tests/**"
      - ".github/workflows/tests.yml"

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyyaml
          pip install -e .

      - name: Validate YAML components (new pipeline)
        run: python -m askee_ds.cli validate

      - name: Render all components with render specs
        run: |
          python -c "
          from askee_ds import Loader, Theme, Renderer
          loader = Loader()
          components = loader.load_components_dir('components/')
          tokens = loader.load_tokens_dir('tokens/')
          theme = Theme(tokens)
          renderer = Renderer(theme)
          rendered = 0
          for name, comp in sorted(components.items()):
              if comp.render.get('type', 'reference') != 'reference':
                  renderer.render(comp, {})
                  rendered += 1
          print(f'{rendered}/{len(components)} components rendered without error')
          "

      - name: Validate design (maps)
        run: python tools/parse_maps.py --validate

      - name: Validate design (decorations)
        run: python tools/parse_decorations.py --validate

      - name: Run framework tests
        run: python -m unittest discover -s tests -v

      - name: Run legacy tools tests
        run: python -m unittest discover -s tools
