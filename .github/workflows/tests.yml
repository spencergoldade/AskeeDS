name: CI

on:
  push:
    paths:
      - "tools/**"
      - "design/**"
      - "package.json"
      - ".github/workflows/tests.yml"
  pull_request:
    paths:
      - "tools/**"
      - "design/**"
      - "package.json"
      - ".github/workflows/tests.yml"

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyyaml
          pip install -e ".[visual-test]"

      - name: Validate design (components)
        run: python tools/parse_components.py --validate design/ascii/components.txt

      - name: Validate design (maps)
        run: python tools/parse_maps.py --validate

      - name: Run Python tests
        run: |
          python -m unittest discover -s tools

