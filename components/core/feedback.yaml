# AskeeDS — core/feedback
# System feedback and response components.


feedback.success:
  category: core/feedback
  description: One-line success message. Green in code.
  status: approved
  props:
    message:
      type: string
      required: true
    color_role:
      type: string
      required: false
  render:
    type: inline
    template: "{message}"
  art: |2
    Taken: rusty sword (+1 weapon)
  default_color_role: success
  notes: Display directly under the input or log to confirm accepted commands.

feedback.error:
  category: core/feedback
  description: One-line error or suggestion. Yellow/red in code.
  status: approved
  props:
    message:
      type: string
      required: true
    suggestion:
      type: string
      required: false
    color_role:
      type: string
      required: false
  render:
    type: inline
    template: "{message}"
  art: |2
    You don't see "sword" here. Did you mean "rusty sword"?
  default_color_role: danger
  notes: >-
    Use when a command fails to parse or act, ideally with a suggested
    fix.

modal.overlay:
  category: core/feedback
  description: Centered bordered box for confirmation/dialog.
  status: ideated
  props:
    title:
      type: string
      required: true
    body_text:
      type: string
      required: true
    color_role:
      type: string
      required: false
  render:
    type: box
    width: fill
    min_width: 30
    max_width: 50
    border: single
    sections:
      - type: header
        text: "{title}"
      - type: divider
      - type: wrap
        text: "{body_text}"
        indent: 1
  art: |2
    +------------------------------------------+
    | Confirm                                  |
    +------------------------------------------+
    | Are you sure you want to quit?           |
    |                                          |
    |        [ Cancel ]  [ Quit ]              |
    +------------------------------------------+
  notes: >-
    Use for blocking confirmations, choices, or alerts over existing
    content.

toast.inline:
  category: core/feedback
  description: Transient one- or two-line feedback.
  status: ideated
  props:
    message:
      type: string
      required: true
    variant:
      type: string
      required: false
    color_role:
      type: string
      required: false
  render:
    type: box
    width: 38
    border: single
    sections:
      - type: text
        text: "  {message}"
  art: |2
    +-----------------------------------+
    |  Saved.                           |
    +-----------------------------------+
  notes: >-
    Briefly show save confirmations or non-blocking alerts near a screen
    edge.

progress-bar.horizontal:
  category: core/feedback
  description: Horizontal bar with optional label/percent.
  status: ideated
  props:
    value:
      type: integer
      required: true
    max:
      type: integer
      required: true
    label:
      type: string
      required: false
    color_role:
      type: string
      required: false
  render:
    type: box
    width: 40
    border: single
    sections:
      - type: progress
        bar_width: 20
        value_prop: value
        max_prop: max
        template: " {label} [{bar}] {value}/{max}"
  art: |2
    +--------------------------------------+
    | Loading [=========>          ] 50/100 |
    +--------------------------------------+
  notes: >-
    Embed wherever you need a generic progress indicator, e.g. loading
    tasks or quests.

spinner.loading:
  category: core/feedback
  description: Animated loading indicator (cycle through frames in code).
  status: ideated
  props:
    style_hint:
      type: string
      required: false
    frames:
      type: array
      required: true
      element_type: string
    color_role:
      type: string
      required: false
  render:
    type: frames
    prop: frames
  art: |2
    |
  notes: >-
    Renders the first frame; consumers cycle through the frames array at
    runtime. Animation is a runtime concern.

feedback.mixed:
  category: core/feedback
  description: Short block summarizing a mixed success (upside and downside).
  status: ideated
  props:
    headline:
      type: string
      required: true
    upside_text:
      type: string
      required: true
    downside_text:
      type: string
      required: true
    color_role:
      type: string
      required: false
  render:
    type: box
    width: 44
    border: single
    sections:
      - type: text
        text: " {headline}"
      - type: text
        text: "  Upside: {upside_text}"
      - type: text
        text: "  Downside: {downside_text}"
  art: |2
    +------------------------------------------+
    | Mixed: You dodge the blow...             |
    |  Upside: You avoid the worst of it.      |
    |  Downside: Your sword slips from hand.   |
    -------------------------------------------+
  notes: >-
    Show after rolls or checks that succeed with complications in
    PbtA-style systems.
