# AskeeDS — core/buttons
# Button components for actions and commands.


button.icon:
  category: core/buttons
  description: Button with leading icon (one or two chars).
  status: approved
  props:
    label:
      type: string
      required: true
    icon:
      type: string
      required: true
    color_role:
      type: string
      required: false
  render:
    type: inline
    template: "[{icon}] {label}"
  interaction:
    focusable: true
    actions:
      - name: activate
        keys: [enter, space]
        description: Press the button
  art: |2
    [☆] Star this
  notes: >-
    Use for primary or secondary actions where a small symbol reinforces
    meaning.

button.text:
  category: core/buttons
  description: Text-only button; no icon.
  status: approved
  props:
    label:
      type: string
      required: true
    color_role:
      type: string
      required: false
  render:
    type: inline
    template: "[ {label} ]"
  interaction:
    focusable: true
    actions:
      - name: activate
        keys: [enter, space]
        description: Press the button
  art: |2
    [ Submit ]
  notes: >-
    Use for simple confirm/cancel or secondary actions in modals and
    screens.
