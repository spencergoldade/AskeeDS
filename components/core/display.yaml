# AskeeDS — core/display
# Text, data, and content display components.


tooltip.default:
  category: core/display
  description: Bordered tooltip; optional stats variant.
  status: ideated
  props:
    text:
      type: string
      required: true
    color_role:
      type: string
      required: false
  render:
    type: box
    width: 34
    border: single
    sections:
      - type: wrap
        text: "{text}"
        indent: 1
  art: |2
    +-------------------------------+
    |  Additional information for   |
    |  your perusal                 |
    +-------------------------------+
  variant: "default | stats"
  notes: >-
    Show contextual help or quick stats when the user focuses or hovers an
    element.

table.fourcolumn:
  category: core/display
  description: Four-column bordered table; header row and data rows.
  status: ideated
  props:
    columns:
      type: array
      required: true
      element_type: string
    rows:
      type: array
      required: true
      element_type: array
    color_role:
      type: string
      required: false
  render:
    type: table
  art: |2
    +----------------------------------+---------+------------------------+----------------+
    |               Col1               |  Col2   |          Col3          | Numeric Column |
    +----------------------------------+---------+------------------------+----------------+
    | Value 1                          | Value 2 | 123                    |           10.0 |
    | Separate                         | cols    | with a tab or 4 spaces |       -2,027.1 |
    | This is a row with only one cell |         |                        |                |
    +----------------------------------+---------+------------------------+----------------+
  notes: >-
    Use for structured tabular data such as stats, settings, or
    comparisons.

divider.horizontal:
  category: core/display
  description: Section separator within a pane; no box.
  status: ideated
  props:
    style_hint:
      type: string
      required: false
    width:
      type: integer
      required: false
    color_role:
      type: string
      required: false
  render:
    type: inline
    template: "------------------------------------------"
  art: |2
    ------------------------------------------
  notes: >-
    Separate logical sections inside a larger pane without drawing a full
    box.

label.inline:
  category: core/display
  description: Short label before value (e.g. stat display).
  status: ideated
  props:
    label:
      type: string
      required: true
    value:
      type: integer
      required: true
    color_role:
      type: string
      required: false
  render:
    type: inline
    template: "{label}: {value}"
  art: |2
    HP: 85
  notes: "Pair with numbers or short values in HUDs, sheets, and summary rows."

card.simple:
  category: core/display
  description: Generic bordered title + body; room-card is game variant.
  status: approved
  props:
    title:
      type: string
      required: true
    body_text:
      type: string
      required: true
    color_role:
      type: string
      required: false
  render:
    type: box
    width: fill
    min_width: 28
    max_width: 50
    border: single
    sections:
      - type: header
        text: "{title}"
      - type: divider
      - type: wrap
        text: "{body_text}"
        indent: 1
  art: |2
    +-- Card title ------------------------+
    | Body text goes here and may wrap     |
    | across multiple lines when needed.   |
    +--------------------------------------+
  notes: >-
    Use as a generic info card for help, lore snippets, or small
    summaries.

header.banner:
  category: core/display
  description: Single-line app/game title with optional trailing controls.
  status: ideated
  props:
    title:
      type: string
      required: true
    controls:
      type: array
      required: false
      element:
        id: string
        label: string
    color_role:
      type: string
      required: false
  render:
    type: box
    width: 50
    border: single
    sections:
      - type: text
        text: " {title}"
  art: |2
    +------------------------------------------------+
    | AskeeDS                   [user] [settings]     |
    +------------------------------------------------+
  notes: >-
    Place at the very top of layouts to carry branding and global
    controls.

typography.banner:
  category: core/display
  description: Multi-line ASCII-art title; structural placeholder for Figlet/Art.
  status: ideated
  props:
    text:
      type: string
      required: true
    style_hint:
      type: string
      required: false
    font:
      type: string
      required: false
    color_role:
      type: string
      required: false
  render:
    type: banner
  art: |2
      ___  ____  _  __ ______
     / _ )/ __ \/ |/ // __/ /
    / _  / /_/ /    /_/ /_/ 
    /____/\____/_/|_/___/___ 
  notes: >-
    Use on splash screens or major transitions. Falls back to reference art
    when pyfiglet is not installed.
