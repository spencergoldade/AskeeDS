# AskeeDS — game/menus
# Game menu and quick-select components.


menu.main:
  category: game/menus
  description: Main menu with title and item list.
  status: ideated
  props:
    title:
      type: string
      required: true
    items:
      type: array
      required: true
      element:
        id: string
        label: string
    color_role:
      type: string
      required: false
  render:
    type: box
    width: fill
    min_width: 30
    max_width: 50
    border: single
    sections:
      - type: header
        text: "{title}"
      - type: divider
      - type: list
        over: items
        template: "  {label}"
  art: |2
    +-- AskeeDS ----------------------+
    |  New game                       |
    |  Load game                      |
    |  Options                        |
    |  Quit                           |
    +---------------------------------+
  interaction:
    focusable: true
    actions:
      - name: select_next
        keys: [down]
        description: Move to next menu item
      - name: select_prev
        keys: [up]
        description: Move to previous menu item
      - name: confirm
        keys: [enter]
        description: Select the highlighted item
  notes: Use on startup or return-to-menu flows for core game navigation.


