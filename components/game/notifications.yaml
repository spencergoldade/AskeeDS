# AskeeDS — game/notifications
# In-game notification components.


notification.inline:
  category: game/notifications
  description: Bordered one-liner for achievements, loot drops, or alerts.
  status: approved
  props:
    prefix:
      type: string
      required: true
    message:
      type: string
      required: true
    color_role:
      type: string
      required: false
  render:
    type: box
    width: 44
    border: single
    sections:
      - type: text
        text: "  {prefix}: {message}"
  art: |2
    +------------------------------------------+
    |  Achievement: First Steps                |
    +------------------------------------------+
  notes: >-
    Pop up for achievements, loot drops, or other brief in-game
    events. Set prefix to "Achievement", "Loot", "Alert", etc.
