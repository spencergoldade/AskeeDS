location-header.default:
  category: game/
  description: Location name displayed at the top of the left column.
  status: approved
  font_size: medium
  props:
    location_name:
      type: string
      required: true
  render:
    type: inline
    template: "{location_name}"
  notes: >-
    Rendered via spec-driven dispatch (LayoutEngine + render_styled_lines).
    No custom Pyglet draw function needed.
