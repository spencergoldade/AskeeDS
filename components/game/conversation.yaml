# AskeeDS — game/conversation
# Dialogue and choice components.


speech-bubble:
  category: game/conversation
  description: Speech bubble with directional tail for NPC or player dialogue.
  status: approved
  props:
    text:
      type: string
      required: true
    tail:
      type: string
      required: false
    speaker_id:
      type: string
      required: false
    color_role:
      type: string
      required: false
  render:
    type: bubble
  art: |2
      +-----------------------------+
     / The guard nods. "Go north."   |
    +-------------------------------+
  notes: >-
    Use for dialogue. Set tail to "left" for NPC speech or "right" for
    player speech. Defaults to "left" if omitted.

choice-wheel.inline:
  category: game/conversation
  description: Vertical numbered options for dialog/choice flow.
  status: approved
  props:
    options:
      type: array
      required: true
      element:
        id: string
        label: string
    color_role:
      type: string
      required: false
  render:
    type: box
    width: 30
    border: single
    sections:
      - type: numbered_list
        over: options
        template: "{label}"
  interaction:
    focusable: true
    actions:
      - name: select_next
        keys: [down, right]
        description: Move to next option
      - name: select_prev
        keys: [up, left]
        description: Move to previous option
      - name: confirm
        keys: [enter]
        description: Confirm selection
  art: |2
    1. Go north
    2. Talk to guard
    3. Take lamp
  notes: >-
    Present small sets of mutually exclusive options during dialog or
    scripted choices.
