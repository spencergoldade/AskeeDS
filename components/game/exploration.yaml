# AskeeDS — game/exploration
# Room, map, and narrative exploration components.


room-card.default:
  category: game/exploration
  description: Room overview with title, description, entities, and exits.
  status: approved
  props:
    title:
      type: string
      required: true
    description_text:
      type: string
      required: true
    items:
      type: array
      required: false
      element:
        id: string
        label: string
    npcs:
      type: array
      required: false
      element:
        id: string
        label: string
    exits:
      type: array
      required: true
      element:
        id: string
        label: string
    color_role:
      type: string
      required: false
  render:
    type: box
    width: 44
    border: single
    sections:
      - type: header
        text: "{title}"
      - type: divider
      - type: wrap
        text: "{description_text}"
        indent: 1
      - type: blank
      - type: list
        label: "Items"
        over: items
        template: "  {label}"
        if_empty: hide
      - type: list
        label: "NPCs"
        over: npcs
        template: "  {label}"
        if_empty: hide
      - type: divider
      - type: list
        label: "Exits"
        over: exits
        template: "  {label}"
  art: |2
    +-- The Clearing ---------------------------------+
    | A small clearing in the woods.                  |
    |                                                 |
    | You see:                                        |
    |   * brass lamp                                  |
    |   * guard                                       |
    | Exits: north  south                             |
    +-------------------------------------------------+
  notes: >-
    Use as the main descriptive block when the player enters or examines a
    room.

entity-list.room:
  category: game/exploration
  description: Scannable list of items and NPCs in current room.
  status: ideated
  props:
    items:
      type: array
      required: true
      element:
        id: string
        label: string
    npcs:
      type: array
      required: true
      element:
        id: string
        label: string
    color_role:
      type: string
      required: false
  render:
    type: box
    width: 30
    border: single
    sections:
      - type: list
        label: "Items"
        over: items
        template: "  * {label}"
        if_empty: hide
      - type: list
        label: "NPCs"
        over: npcs
        template: "  * {label}"
        if_empty: hide
  art: |2
    You see:
      * brass lamp
      * guard
  color_hint: entity.item
  notes: >-
    Render under a room description or in a sidebar to list interactable
    entities.

exit-list.inline:
  category: game/exploration
  description: Exits line derived from room exits.
  status: ideated
  props:
    directions:
      type: array
      required: true
      element:
        id: string
        label: string
    color_role:
      type: string
      required: false
  render:
    type: join
    over: directions
    separator: "  "
    template: "{label}"
    prefix: "Exits: "
  art: |2
    Exits: north  south  east
  color_hint: entity.npc
  notes: >-
    Place after a room description or entity list to advertise available
    directions.

minimap.default:
  category: game/exploration
  description: Small ASCII grid (e.g. 10x10) with legend.
  status: ideated
  props:
    grid:
      type: array
      required: true
      element_type: array
    legend_entries:
      type: array
      required: false
      element:
        char: string
        label: string
    player_position:
      type: string
      required: true
    color_role:
      type: string
      required: false
  render:
    type: reference
  art: |2
    +----------+
    | ....#....|
    | .P.#.....|
    | ....D....|
    +----------+
      . empty  # wall  P you  D door
  notes: >-
    Show in a secondary pane to give spatial context without replacing
    text descriptions.

narrative-log.pane:
  category: game/exploration
  description: Scrollable narrative output; primary focus area.
  status: ideated
  props:
    lines:
      type: array
      required: true
      element_type: string
    max_visible:
      type: integer
      required: true
    color_role:
      type: string
      required: false
  render:
    type: box
    width: 52
    border: single
    sections:
      - type: header
        text: "Narrative log"
      - type: divider
      - type: list
        over: lines
        template: " {}"
  art: |2
    +-- Narrative log ---------------------------------+
    | You enter the clearing.                          |
    | The guard eyes you but says nothing.             |
    |                                                  |
    +--------------------------------------------------+
  notes: "Use as the main scrolling history of events, descriptions, and dialog."
