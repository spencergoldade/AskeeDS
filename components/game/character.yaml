# AskeeDS — game/character
# Character stats, conditions, and relationships.


character-sheet.compact:
  category: game/character
  description: Compact stat block with name header and resource bars.
  status: approved
  props:
    name:
      type: string
      required: true
    stats:
      type: array
      required: true
      element:
        label: string
        current: integer
        max: integer
    color_role:
      type: string
      required: false
  render:
    type: box
    width: 34
    border: single
    sections:
      - type: header
        text: "{name}"
      - type: divider
      - type: bars
        over: stats
        bar_width: 10
        template: " {label:<5} [{bar}] {current}/{max}"
  art: |2
    Hero
    HP:  [=========>    ] 85/100
    Mana: [====          ] 20/50
  notes: >-
    Show as a sidebar or dedicated screen summarizing the current
    character state.

panel.survival-status:
  category: game/character
  description: >-
    Compact survival panel grouping hunger, thirst, fatigue, and similar
    needs.
  status: ideated
  props:
    needs:
      type: array
      required: true
      element:
        label: string
        current: integer
        max: integer
    color_role:
      type: string
      required: false
  render:
    type: box
    width: 40
    border: single
    sections:
      - type: header
        text: "Survival"
      - type: divider
      - type: bars
        over: needs
        bar_width: 12
        template: " {label:<8} [{bar}] {current}/{max}"
  art: |2
    Survival
    Hunger:   [=====               ] 30/100
    Thirst:   [========            ] 55/100
    Fatigue:  [===========         ] 70/100
  default_color_role: neutral
  notes: >-
    Use in survival-focused games to track core needs alongside HP and
    resources.

tree.compact:
  category: game/character
  description: Indented hierarchy for skills/abilities/loadouts.
  status: ideated
  props:
    nodes:
      type: array
      required: true
      element:
        id: string
        label: string
        children: array
    color_role:
      type: string
      required: false
  render:
    type: tree
    prop: nodes
    template: "{label}"
  art: |2
    Combat
      > Strike
      > Block
      > Parry
    Lore
      > Identify
      > Persuade
  notes: >-
    Show skill trees, perk lists, or nested loadouts in a text-friendly
    hierarchy.

tree.relationships:
  category: game/character
  description: >-
    Indented list of NPC and faction relationships with attitudes and
    tags.
  status: ideated
  props:
    relations:
      type: array
      required: true
      element:
        name: string
        attitude: string
        tags: array
    color_role:
      type: string
      required: false
  render:
    type: tree
    prop: relations
    template: "{name} ({attitude})"
  art: |2
    Allies
      > Guard captain (friendly) [city, watch]
    Rivals
      > Thieves' Guild (hostile) [underworld]
  notes: >-
    Use on a relationships or factions screen to surface social ties and
    standings.

panel.consequence:
  category: game/character
  description: Panel listing lasting body and mental consequences with severities.
  status: ideated
  props:
    body_conditions:
      type: array
      required: true
      element:
        label: string
        severity: string
    mental_conditions:
      type: array
      required: true
      element:
        label: string
        severity: string
    color_role:
      type: string
      required: false
  render:
    type: box
    width: 44
    border: single
    sections:
      - type: header
        text: "Consequences"
      - type: divider
      - type: list
        label: "Body"
        over: body_conditions
        template: "  - {label} ({severity})"
      - type: list
        label: "Mental"
        over: mental_conditions
        template: "  - {label} ({severity})"
  art: |2
    +------------------------------------------+
    | Consequences                             |
    +------------------------------------------+
    | Body:                                    |
    |  - Scarred arm (mild)                    |
    |  - Broken rib (severe)                   |
    | Mental:                                  |
    |  - Nightmares (moderate)                 |
    |  - Shaken faith (mild)                   |
    +------------------------------------------+
  notes: >-
    Use in games with long-term injuries or trauma to summarize ongoing
    effects.
