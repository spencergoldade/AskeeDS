# AskeeDS — game/screens
# Full-screen state components.


screen.loading:
  category: game/screens
  description: Centered loading message + optional tip.
  status: ideated
  props:
    message:
      type: string
      required: true
    tip:
      type: string
      required: false
    color_role:
      type: string
      required: false
  render:
    type: box
    width: 44
    border: single
    sections:
      - type: blank
      - type: text
        text: "            {message}"
      - type: text
        text: "     {tip}"
      - type: blank
  art: |2
    +------------------------------------------+
    |                                          |
    |            Loading...                    |
    |     Tip: Type "look" to examine.         |
    |                                          |
    +------------------------------------------+
  notes: >-
    Display while loading saves, generating worlds, or performing long
    operations.

screen.crafting:
  category: game/screens
  description: >-
    Crafting workbench screen with input slots, output preview, and
    resource costs.
  status: ideated
  props:
    inputs:
      type: array
      required: true
      element:
        label: string
        item_name: string
    output_preview:
      type: string
      required: true
    success_chance:
      type: integer
      required: false
    resource_costs:
      type: array
      required: true
      element:
        label: string
        amount: integer
    color_role:
      type: string
      required: false
  render:
    type: box
    width: 44
    border: single
    sections:
      - type: header
        text: "Crafting Bench"
      - type: divider
      - type: list
        label: "Inputs"
        over: inputs
        template: "  [ {item_name} ]"
      - type: blank
      - type: text
        text: " Output: {output_preview}"
  art: |2
    +------------------------------------------+
    |           Crafting bench                 |
    +------------------------------------------+
    | Inputs:                                  |
    |  [ herb ]  [ bottle ]                    |
    |                                          |
    | Output: healing potion                   |
    | Chance: 75%                              |
    |                                          |
    | Costs: mana 5, time 1h                   |
    +------------------------------------------+
  notes: >-
    Use for dedicated crafting flows where players combine items into new
    outputs.

screen.death:
  category: game/screens
  description: Death screen with title, message, and actions.
  status: ideated
  props:
    message:
      type: string
      required: true
    actions:
      type: array
      required: true
      element:
        id: string
        label: string
    color_role:
      type: string
      required: false
  render:
    type: box
    width: 44
    border: single
    sections:
      - type: header
        text: "You have died."
      - type: blank
      - type: wrap
        text: "{message}"
        indent: 1
      - type: blank
  art: |2
    +------------------------------------------+
    |         You have died.                   |
    |                                          |
    |  The guard's blade finds you.            |
    |                                          |
    |    [ Respawn ]  [ Main menu ]            |
    +------------------------------------------+
  notes: >-
    Show when the player reaches a fail state, offering respawn or exit
    actions.

screen.tutorial:
  category: game/screens
  description: Small bordered hint with title, body, and dismiss button.
  status: ideated
  props:
    title:
      type: string
      required: true
    body:
      type: string
      required: true
    dismiss_label:
      type: string
      required: true
    color_role:
      type: string
      required: false
  render:
    type: box
    width: 36
    border: single
    sections:
      - type: header
        text: "{title}"
      - type: divider
      - type: wrap
        text: "{body}"
        indent: 1
  art: |2
    +-- Hint -------------------------+
    |  Type "go north" to move.       |
    |           [ OK ]                |
    +---------------------------------+
  notes: Use to surface onboarding hints or contextual guidance early in play.

decoration.placeholder:
  category: game/screens
  description: >-
    Slot for decorative ASCII art. Width and height define slot size;
    art is supplied from a catalog and cropped or centered to fit.
  status: ideated
  props:
    art_id:
      type: string
      required: true
    width:
      type: integer
      required: true
    height:
      type: integer
      required: true
    color_role:
      type: string
      required: false
  render:
    type: art_lookup
  art: |2
     .-~~~-.
    (  o   o  )
    (   ^   )
     \|_|_/
  notes: >-
    Falls back to reference art until decorations are migrated to YAML.
    Once migrated, looks up art by art_id from the decoration catalog.
