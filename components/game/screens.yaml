# AskeeDS — game/screens
# Full-screen state components.


screen.loading:
  category: game/screens
  description: Centered loading message + optional tip.
  status: approved
  props:
    message:
      type: string
      required: true
    tip:
      type: string
      required: false
    color_role:
      type: string
      required: false
  render:
    type: box
    width: fill
    min_width: 30
    max_width: 60
    border: single
    sections:
      - type: blank
      - type: text
        text: "            {message}"
      - type: text
        text: "     {tip}"
      - type: blank
  art: |2
    +------------------------------------------+
    |                                          |
    |            Loading...                    |
    |     Tip: Type "look" to examine.         |
    |                                          |
    +------------------------------------------+
  notes: >-
    Display while loading saves, generating worlds, or performing long
    operations.

screen.crafting:
  category: game/screens
  description: >-
    Crafting workbench screen with input slots, output preview, and
    resource costs.
  status: approved
  props:
    inputs:
      type: array
      required: true
      element:
        label: string
        item_name: string
    output_preview:
      type: string
      required: true
    success_chance:
      type: integer
      required: false
    resource_costs:
      type: array
      required: true
      element:
        label: string
        amount: integer
    color_role:
      type: string
      required: false
  render:
    type: box
    width: 44
    border: single
    sections:
      - type: header
        text: "Crafting Bench"
      - type: divider
      - type: list
        label: "Inputs"
        over: inputs
        template: "  [ {item_name} ]"
      - type: blank
      - type: text
        text: " Output: {output_preview}"
  art: |2
    +------------------------------------------+
    |           Crafting bench                 |
    +------------------------------------------+
    | Inputs:                                  |
    |  [ herb ]  [ bottle ]                    |
    |                                          |
    | Output: healing potion                   |
    | Chance: 75%                              |
    |                                          |
    | Costs: mana 5, time 1h                   |
    +------------------------------------------+
  notes: >-
    Use for dedicated crafting flows where players combine items into new
    outputs.

screen.death:
  category: game/screens
  description: Death screen with title, message, and actions.
  status: approved
  props:
    message:
      type: string
      required: true
    actions:
      type: array
      required: true
      element:
        id: string
        label: string
    color_role:
      type: string
      required: false
  render:
    type: box
    width: 44
    border: single
    sections:
      - type: header
        text: "You have died."
      - type: blank
      - type: wrap
        text: "{message}"
        indent: 1
      - type: blank
  art: |2
    +------------------------------------------+
    |         You have died.                   |
    |                                          |
    |  The guard's blade finds you.            |
    |                                          |
    |    [ Respawn ]  [ Main menu ]            |
    +------------------------------------------+
  notes: >-
    Show when the player reaches a fail state, offering respawn or exit
    actions.

screen.tutorial:
  category: game/screens
  description: Small bordered hint with title, body, and dismiss button.
  status: approved
  props:
    title:
      type: string
      required: true
    body:
      type: string
      required: true
    dismiss_label:
      type: string
      required: true
    color_role:
      type: string
      required: false
  render:
    type: box
    width: 36
    border: single
    sections:
      - type: header
        text: "{title}"
      - type: divider
      - type: wrap
        text: "{body}"
        indent: 1
  art: |2
    +-- Hint -------------------------+
    |  Type "go north" to move.       |
    |           [ OK ]                |
    +---------------------------------+
  notes: Use to surface onboarding hints or contextual guidance early in play.

reading.book:
  category: game/screens
  description: Full-screen book/readable viewer with paginated content.
  status: approved
  props:
    title:
      type: string
      required: true
    content:
      type: string
      required: true
    readable_type:
      type: string
      required: false
    item_id:
      type: string
      required: false
    current_page:
      type: integer
      required: true
    total_pages:
      type: integer
      required: true
  render:
    type: inline
    template: "[{title}] Page {current_page}/{total_pages}"
  notes: >-
    Renders a single page of readable content. Pagination is handled by
    ReadingScreen in engine/bridge/screens/reading.py.

preset-select:
  category: game/screens
  description: Character creation preset selection (create-new vs premade).
  status: approved
  props:
    presets:
      type: array
      required: true
      element:
        id: string
        label: string
        description: string
        archetype_id: string
        lineage_id: string
    selected_index:
      type: integer
      required: true
  render:
    type: box
    width: fill
    min_width: 30
    max_width: 60
    border: single
    sections:
      - type: header
        text: "Choose a path"
      - type: divider
      - type: list
        over: presets
        template: "  {label}"
  notes: >-
    Entry point for character creation. Players pick a premade character or
    start the full wizard.

creation-wizard:
  category: game/screens
  description: Multi-panel character creation wizard (lineage, archetype, backstory, appearance).
  status: approved
  props:
    active_panel:
      type: string
      required: true
    lineages:
      type: array
      required: true
    archetypes:
      type: array
      required: true
    backstories:
      type: array
      required: true
    appearance_sliders:
      type: array
      required: true
    skill_options:
      type: array
      required: false
    skill_picks:
      type: array
      required: false
    choices:
      type: string
      required: true
  render:
    type: box
    width: fill
    border: single
    sections:
      - type: header
        text: "Character Creation"
      - type: divider
      - type: text
        text: "Panel: {active_panel}"
  notes: >-
    Full character creation flow. The Pyglet backend will implement a custom
    draw function for this component.

creation-summary:
  category: game/screens
  description: Character creation summary/confirmation screen.
  status: approved
  props:
    lineage_id:
      type: string
      required: false
    archetype_id:
      type: string
      required: false
    backstory_id:
      type: string
      required: false
    skill_picks:
      type: array
      required: false
    appearance:
      type: string
      required: false
    lineage_label:
      type: string
      required: false
    archetype_label:
      type: string
      required: false
    backstory_label:
      type: string
      required: false
  render:
    type: box
    width: fill
    border: single
    sections:
      - type: header
        text: "Confirm Character"
      - type: divider
      - type: text
        text: "Lineage: {lineage_label}"
      - type: text
        text: "Archetype: {archetype_label}"
      - type: text
        text: "Backstory: {backstory_label}"
  notes: >-
    Shows chosen character options before confirming and starting the game.

difficulty-select:
  category: game/screens
  description: Difficulty profile selection screen.
  status: approved
  props:
    profiles:
      type: array
      required: true
      element:
        id: string
        label: string
        description: string
    selected_index:
      type: integer
      required: true
  render:
    type: box
    width: fill
    min_width: 30
    max_width: 50
    border: single
    sections:
      - type: header
        text: "Select Difficulty"
      - type: divider
      - type: list
        over: profiles
        template: "  {label}"
  notes: >-
    Shown before gameplay begins when the game offers multiple difficulty
    profiles.

screen.placeholder:
  category: game/screens
  description: Generic placeholder shown for screens not yet implemented.
  status: ideated
  render:
    type: inline
    template: "[screen.placeholder]"
  notes: >-
    Fallback placeholder for screens that have no dedicated draw function yet.

