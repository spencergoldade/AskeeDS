# AskeeDS — game/trackers
# Objective, time, and threat tracking components.


tracker.objective:
  category: game/trackers
  description: One line per objective; unchecked/checked.
  status: ideated
  props:
    objectives:
      type: array
      required: true
      element:
        id: string
        label: string
        checked: boolean
    color_role:
      type: string
      required: false
  render:
    type: box
    width: 32
    border: single
    sections:
      - type: checked_list
        over: objectives
        check_prop: checked
        template: "{label}"
  art: |2
    [ ] Find the key
    [x] Talk to the guard
    [ ] Open the door
  notes: >-
    Show in a sidebar or overlay listing current quests or objectives with
    completion state.

tracker.clock:
  category: game/trackers
  description: >-
    Segment-style progress clock for countdowns, projects, or looming
    threats.
  status: ideated
  props:
    label:
      type: string
      required: true
    segments:
      type: integer
      required: true
    filled:
      type: integer
      required: true
    risk_level:
      type: string
      required: false
    color_role:
      type: string
      required: false
  render:
    type: clock
  art: |2
    Quest: Find the key
    [○○○○]   0 / 4
  default_color_role: neutral
  notes: >-
    Pair with objectives to visualize time pressure or progress toward a
    key event.

tracker.front:
  category: game/trackers
  description: >-
    Horizontal multi-stage track showing an advancing front or world
    threat.
  status: ideated
  props:
    label:
      type: string
      required: true
    stages:
      type: array
      required: true
      element:
        id: string
        label: string
    current_stage_index:
      type: integer
      required: true
    color_role:
      type: string
      required: false
  render:
    type: stage_track
  art: |2
    Invasion front:
    [ Safe ]-[ Skirmishes ]-[ Occupied ]-[ Overrun ]
       ^
  notes: >-
    Use to track escalating world states such as invasions, storms, or
    rumors.
