# AskeeDS Screen — adventure.two-col
# Two-column adventure layout: room + hints + input on left, character sheet + entity list on right.
# Compose with: askee-ds compose screens/examples/adventure_two_col.yaml

name: adventure.two-col
description: Two-column adventure screen with room card, hints, and input on left; character sheet and entity list on right.
layout: layout.two-column
available_width: 80

slots:
  left_content:
    component: layout.stack
    slots:
      blocks:
        - component: room-card.default
          props:
            title: The Undercroft
            description_text: A low-ceilinged stone chamber. Water drips from the walls.
            items:
              - {id: torch, label: "Torch (lit)"}
              - {id: key, label: "Rusty key"}
            npcs:
              - {id: figure, label: "Hooded figure"}
            exits:
              - {id: north, label: North}
              - {id: east, label: East}

        - component: hint-bar.contextual
          props:
            prefix: "Actions: "
            hints:
              - {id: look, label: look}
              - {id: go, label: "go <dir>"}
              - {id: take, label: "take <item>"}
              - {id: talk, label: talk}

        - component: command-input.default
          props:
            prompt: ">"

  right_content:
    component: layout.stack
    slots:
      blocks:
        - component: character-sheet.compact
          props:
            name: Kael
            stats:
              - {label: HP, current: 85, max: 100}
              - {label: MP, current: 30, max: 50}

        - component: entity-list.room
          props:
            items:
              - {id: torch, label: "Torch (lit)"}
              - {id: key, label: "Rusty key"}
            npcs:
              - {id: figure, label: "Hooded figure"}

  left_width: 50
